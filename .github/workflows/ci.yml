name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v --tb=short

      - name: Run tests with coverage
        run: pytest test_app.py --cov=app --cov-report=term-missing

      - name: Build notification
        run: echo "Build and tests passed successfully!"

      - name: Deploy message
        run: echo "Ready for deployment to Render..."
